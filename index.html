<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>出租屋幸福感内容合集</title>
<style>
*{box-sizing:border-box}
:root{--ink:#20251f;--muted:#697069;--line:#dfe6dc;--paper:#fffefa;--soft:#f6f7f1;--green:#1f7a5a;--mint:#e7f4ec;--amber:#a66516;--blue:#28688f;--rose:#a94442}
body{margin:0;font-family:"Microsoft YaHei","PingFang SC",Arial,sans-serif;background:#ecefe8;color:var(--ink)}
button,a{font:inherit}
.shell{min-height:100vh;display:flex;justify-content:center;background:linear-gradient(180deg,#f4f6ef 0%,#e9ede5 100%)}
.app{width:min(100%,460px);min-height:100vh;background:var(--paper);box-shadow:0 0 0 1px rgba(32,37,31,.06),0 18px 50px rgba(32,37,31,.12)}
.top{position:sticky;top:0;z-index:10;background:rgba(255,254,250,.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);padding:14px 16px 10px}
.kicker{font-size:12px;color:var(--green);font-weight:700;margin-bottom:6px}
h1{font-size:22px;line-height:1.18;margin:0 0 10px;font-weight:900;letter-spacing:0}
.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.metric{border:1px solid var(--line);border-radius:8px;padding:8px;background:#fbfcf7;min-height:54px}
.metric b{display:block;font-size:18px;line-height:1;margin-bottom:5px}.metric span{font-size:11px;color:var(--muted)}
.tabs{display:flex;gap:8px;overflow-x:auto;padding:12px 16px 4px;scrollbar-width:none}.tabs::-webkit-scrollbar{display:none}
.tab{flex:0 0 auto;border:1px solid var(--line);background:#fff;border-radius:8px;min-width:116px;max-width:180px;padding:8px 10px;text-align:left;color:var(--muted);cursor:pointer}.tab strong{display:block;color:var(--ink);font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.tab span{display:block;margin-top:4px;font-size:11px}.tab.active{border-color:var(--green);background:var(--mint)}
.content{padding:8px 16px 28px}.section-head{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;margin:8px 0 10px}.section-head h2{font-size:17px;margin:0;line-height:1.25}.section-head p{margin:4px 0 0;color:var(--muted);font-size:12px}.status{font-size:11px;border:1px solid var(--line);border-radius:8px;padding:5px 7px;background:#fff;white-space:nowrap}.status.ready{color:var(--green);background:var(--mint);border-color:#c5e2cf}.status.planned{color:var(--amber);background:#fff5e8;border-color:#efd8b6}
.feed{display:flex;flex-direction:column;gap:12px}.item{border:1px solid var(--line);border-radius:8px;background:#fff;overflow:hidden}.visual{height:158px;background:#eef3ea;display:grid;grid-template-columns:1fr;place-items:center;padding:16px;position:relative;border-bottom:1px solid var(--line)}.visual::before{content:"";position:absolute;inset:0;background:linear-gradient(135deg,rgba(31,122,90,.10),transparent 36%),linear-gradient(45deg,transparent 0 48%,rgba(40,104,143,.08) 48% 52%,transparent 52%)}.visual img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}.visual-inner{position:relative;text-align:center}.visual-title{font-weight:900;font-size:18px}.visual-note{font-size:12px;color:var(--muted);margin-top:6px}.body{padding:12px}.row{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}.row>div:first-child{min-width:0}.id{font-size:12px;color:var(--muted);font-weight:700}.item h3{font-size:17px;line-height:1.35;margin:4px 0 8px;word-break:break-word}.type{font-size:12px;color:var(--blue);font-weight:700;text-align:right;max-width:128px;line-height:1.4}.reason{font-size:13px;line-height:1.65;color:#394138;margin:10px 0}.tags{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0}.tag{border-radius:8px;background:#eef5ee;color:#245b43;padding:5px 7px;font-size:11px;font-weight:700}.evidence{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 0}.evidence div{border:1px solid var(--line);border-radius:8px;padding:8px;min-height:52px;background:#fbfcf7}.evidence b{display:block;font-size:15px}.evidence span{font-size:11px;color:var(--muted)}.checks{font-size:12px;line-height:1.55;color:var(--muted);border-top:1px solid var(--line);padding-top:10px}.actions{display:flex;gap:8px;margin-top:12px}.btn{display:inline-flex;align-items:center;justify-content:center;min-height:38px;border-radius:8px;border:1px solid var(--line);background:#fff;color:var(--ink);text-decoration:none;font-weight:800;font-size:13px;padding:0 12px}.btn.primary{background:var(--green);border-color:var(--green);color:#fff;flex:1}.btn.secondary{color:var(--blue)}
.empty{border:1px dashed #d7c19b;background:#fff9ef;border-radius:8px;padding:18px;text-align:left}.empty h3{margin:0 0 8px;font-size:16px}.empty p{margin:0;color:#70522a;font-size:13px;line-height:1.65}.gap-panel{margin-top:16px;border:1px solid #ead7d5;background:#fff8f7;border-radius:8px;padding:12px}.gap-panel h3{margin:0 0 8px;font-size:15px;color:var(--rose)}.gap-list{display:flex;flex-direction:column;gap:7px}.gap{display:flex;justify-content:space-between;gap:12px;border-top:1px solid #f0dfdd;padding-top:7px;font-size:12px}.gap:first-child{border-top:0;padding-top:0}.gap span{color:var(--muted)}
.footer-note{margin-top:16px;color:var(--muted);font-size:12px;line-height:1.6}.source{font-size:11px;color:var(--muted);margin-top:8px}.loading{padding:30px 16px;color:var(--muted);font-size:14px}
@media (min-width:700px){.app{margin:24px 0;min-height:calc(100vh - 48px);border-radius:8px;overflow:hidden}.visual{height:176px}}
</style>
</head>
<body>

  ]},
  datasets:{"chuzu-budakong-kebanzou-xingfugan":{keyword:"出租屋 不打孔 可搬走 提升幸福感",slug:"chuzu-budakong-kebanzou-xingfugan",category:"通用入口",room_position:"全屋",collection_status:"ready",summary:{target_count:5,valid_count:5,suspect_count:1,invalid_count:0},items:[
    {id:"001",note_title:"1000元搞定出租屋！好物清单",note_url:"https://www.xiaohongshu.com/explore/69b537d8000000001e00f71d",item_name:"出租屋平价好物清单",item_type:"软装、灯光、收纳、小家具",reason:"正文明确提到无广、纯自费自用、不打孔、不破坏墙面、退房直接带走，适合低成本提升出租屋幸福感。",rental_constraints:["不打孔","不破坏墙面","可搬走","平价"],like_count:829,favorite_count:null,comment_count:111,real_comment_count:4,authenticity_status:"valid",author_check:"作者正文自述纯自费自用；页面可见作者多次回复评论。",comment_user_check:"评论包含沙发舒服吗、地毯怎么样、求链接等具体追问。",images:["data/xiaohongshu/chuzu-budakong-kebanzou-xingfugan/images/001-cover.webp"],cover_image:"data/xiaohongshu/chuzu-budakong-kebanzou-xingfugan/images/001-cover.webp"},
    {id:"002",note_title:"租房党狂喜：不伤墙也能兼备氛围感与实用性",note_url:"https://www.xiaohongshu.com/explore/6921ea27000000001b03008f",item_name:"沙发后窄置物架、吸盘挂钩、磁吸架、落地灯",item_type:"收纳、灯光、软装",reason:"正文按装饰、收纳、个性表达拆解不伤墙方案，强调把打孔需求降级为落地、磁吸、吸盘、免钉方案。",rental_constraints:["不伤墙","吸盘","磁吸","免钉","可搬走"],like_count:880,favorite_count:null,comment_count:23,real_comment_count:5,authenticity_status:"valid",author_check:"内容为个人租房方案复盘，有具体实战方案和作者回复。",comment_user_check:"评论追问置物架是否不方便、是否容易掉，作者回复使用稳定。",images:["data/xiaohongshu/chuzu-budakong-kebanzou-xingfugan/images/002-cover.webp"],cover_image:"data/xiaohongshu/chuzu-budakong-kebanzou-xingfugan/images/002-cover.webp"},

    {id:"004",note_title:"不打洞 1平方米公租房卫生间改造",note_url:"https://www.xiaohongshu.com/explore/67d14d2a000000002902ddc5",item_name:"浴室置物架、收纳柜、收纳筐、壁挂收纳",item_type:"浴室收纳",reason:"正文强调公租房卫生间不打洞改造，用置物架、收纳柜和收纳筐补足小空间收纳。",rental_constraints:["不打洞","小空间","收纳","公租房"],like_count:1919,favorite_count:null,comment_count:54,real_comment_count:4,authenticity_status:"valid",author_check:"内容聚焦个人公租房卫生间，作者对置物架、壁挂收纳、清洁问题有回复。",comment_user_check:"评论包含镜子下置物板、壁挂收纳筐、浴室地面清理等具体追问。",images:["data/xiaohongshu/chuzu-budakong-kebanzou-xingfugan/images/004-cover.webp"],cover_image:"data/xiaohongshu/chuzu-budakong-kebanzou-xingfugan/images/004-cover.webp"},
    {id:"005",note_title:"租房而已，不过度改造也能干净整洁",note_url:"https://www.xiaohongshu.com/explore/6a1fbff900000000080020c7",item_name:"货架衣柜、九宫格收纳柜、免打孔百叶帘、过滤龙头、多功能挂篮",item_type:"收纳、窗帘、浴室/厨房小物",reason:"正文强调租房不用过度改造，只留实用好物，覆盖收纳、免打孔百叶帘、过滤龙头和多功能挂篮。",rental_constraints:["不过度改造","免打孔","平价","实用"],like_count:489,favorite_count:null,comment_count:40,real_comment_count:5,authenticity_status:"valid",author_check:"内容围绕租房实用物品展开，有具体物品与作者回复。",comment_user_check:"评论追问九宫格收纳、过滤龙头、衣柜帘子、收纳袋垫高方式等。",images:["data/xiaohongshu/chuzu-budakong-kebanzou-xingfugan/images/005-cover.webp"],cover_image:"data/xiaohongshu/chuzu-budakong-kebanzou-xingfugan/images/005-cover.webp"}
  ]},"zufang-woshi-fenweigan-100yuannei":{keyword:"租房 卧室 氛围感 100元内",slug:"zufang-woshi-fenweigan-100yuannei",category:"氛围感",room_position:"卧室",collection_status:"planned",summary:{target_count:5,valid_count:0,suspect_count:0,invalid_count:0},items:[]},"chuzu-shouna-shiyong-buzhandi":{keyword:"出租屋 收纳 实用 不占地",slug:"chuzu-shouna-shiyong-buzhandi",category:"实用",room_position:"全屋",collection_status:"planned",summary:{target_count:5,valid_count:0,suspect_count:0,invalid_count:0},items:[]}}
};
let state={manifest:null,datasets:{},selectedSlug:""};
const el=id=>document.getElementById(id);
const safe=v=>v==null||v===""?"待补":v;
async function fetchJson(path){const res=await fetch(path,{cache:"no-store"});if(!res.ok)throw new Error(path);return res.json();}
async function loadData(){try{const manifest=await fetchJson("data/xiaohongshu/manifest.json");const datasets={};for(const k of manifest.keywords){try{datasets[k.slug]=await fetchJson("data/xiaohongshu/"+k.index_json)}catch(e){datasets[k.slug]=fallbackData.datasets[k.slug]||{...k,items:[],summary:{target_count:5,valid_count:0,suspect_count:0,invalid_count:0}}}}el("sourceLabel").textContent="已读取 data/xiaohongshu 本地数据";return{manifest,datasets}}catch(e){el("sourceLabel").textContent="本地 JSON 读取受限，正在使用 HTML 内置兜底数据";return fallbackData}}
function renderSummary(){const total=state.manifest.keywords.reduce((n,k)=>n+(k.item_count||0),0);const ready=state.manifest.keywords.filter(k=>k.status==="ready").length;el("summary").innerHTML=`<div class="metric"><b>${total}</b><span>有效内容</span></div><div class="metric"><b>${ready}/${state.manifest.keywords.length}</b><span>关键词进度</span></div><div class="metric"><b>${countGaps()}</b><span>字段缺口</span></div>`}
function renderTabs(){el("tabs").innerHTML=state.manifest.keywords.map(k=>`<button class="tab ${k.slug===state.selectedSlug?"active":""}" data-slug="${k.slug}"><strong>${k.category}</strong><span>${k.keyword}</span></button>`).join("");document.querySelectorAll(".tab").forEach(btn=>btn.addEventListener("click",()=>{state.selectedSlug=btn.dataset.slug;render()}))}
function countGaps(){let n=0;Object.values(state.datasets).forEach(d=>(d.items||[]).forEach(item=>{if(!item.cover_image)n++;if(item.like_count==null)n++;if(item.favorite_count==null)n++;if(!item.price)n++}));return n}
function itemCard(item,index){const tags=(item.rental_constraints||[]).map(t=>`<span class="tag">${t}</span>`).join("");const hasImage=item.cover_image||((item.images||[])[0]);return `<article class="item"><div class="visual">${hasImage?`<img alt="${item.item_name}" src="${hasImage}">`:`<div class="visual-inner"><div class="visual-title">${String(index+1).padStart(2,"0")}</div><div class="visual-note">缺封面图，先用占位验证版式</div></div>`}</div><div class="body"><div class="row"><div><div class="id">#${item.id}</div><h3>${item.item_name}</h3></div><div class="type">${item.item_type}</div></div><p class="reason">${item.reason}</p><div class="tags">${tags}</div><div class="evidence"><div><b>${safe(item.real_comment_count)}</b><span>真实评价</span></div><div><b>${safe(item.comment_count)}</b><span>评论数</span></div><div><b>${safe(item.like_count)}</b><span>点赞数</span></div></div><div class="checks"><b>真实性线索：</b>${item.comment_user_check}<br><b>作者检查：</b>${item.author_check}</div><div class="actions"><a class="btn primary" href="${item.note_url}" target="_blank" rel="noopener">打开小红书</a><a class="btn secondary" href="#gaps">看缺口</a></div></div></article>`}
function gapPanel(dataset){const items=dataset.items||[];const missingImage=items.filter(i=>!i.cover_image&&!(i.images||[]).length).length;const missingLike=items.filter(i=>i.like_count==null).length;const missingFavorite=items.filter(i=>i.favorite_count==null).length;const missingPrice=items.filter(i=>!i.price).length;return `<section class="gap-panel" id="gaps"><h3>页面暴露的采集缺口</h3><div class="gap-list"><div class="gap"><b>封面/图片</b><span>${missingImage} 条缺失，卡片只能占位</span></div><div class="gap"><b>点赞数</b><span>${missingLike} 条缺失，排序依据不足</span></div><div class="gap"><b>收藏数</b><span>${missingFavorite} 条缺失，无法评估长期价值</span></div><div class="gap"><b>价格字段</b><span>${missingPrice} 条缺失，无法做 100 元内筛选</span></div><div class="gap"><b>细分位置</b><span>多数记录仍是全屋，需要补卧室、厕所、门口等</span></div></div></section>`}
function renderContent(){const key=state.manifest.keywords.find(k=>k.slug===state.selectedSlug);const dataset=state.datasets[state.selectedSlug]||{...key,items:[],summary:{target_count:5,valid_count:0}};const statusClass=key.status==="ready"?"ready":"planned";let html=`<div class="section-head"><div><h2>${key.keyword}</h2><p>${key.room_position} · ${key.category} · 目标 ${dataset.summary?.target_count||5} 条</p></div><span class="status ${statusClass}">${key.status}</span></div>`;if((dataset.items||[]).length){html+=`<div class="feed">${dataset.items.map(itemCard).join("")}</div>${gapPanel(dataset)}`}else{html+=`<div class="empty"><h3>待采集</h3><p>这个关键词还没有有效记录。页面已经预留卡片结构，后续采集时优先补封面图、价格、点赞/收藏、真实评价截图线索和细分房间位置。</p></div>${gapPanel(dataset)}`}html+=`<p class="footer-note">数据来自本地 <b>data/xiaohongshu</b>。当前页面用于验证展示结构，后续补图后可替换占位视觉。</p>`;el("content").innerHTML=html}
function render(){renderSummary();renderTabs();renderContent()}
loadData().then(data=>{state=data;state.selectedSlug=state.manifest.keywords.find(k=>k.status==="ready")?.slug||state.manifest.keywords[0]?.slug;render()});
</script>
