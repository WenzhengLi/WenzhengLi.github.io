function itemCard(item,index,slug){const tags=[...(item.rental_constraints||[]),...(item.content_tags||[])].filter((t,i,a)=>a.indexOf(t)===i).map(t=>`<span class="tag">${t}</span>`).join("");return `<article class="item">${cardCarousel(item,index,slug)}<div class="body"><div class="row"><div><div class="id">#${item.id}</div><h3>${item.item_name}</h3></div><div class="type">${item.item_type}</div></div><p class="reason">${item.reason}</p><div class="tags">${tags}</div><div class="evidence"><div><b>${safe(item.real_comment_count)}</b><span>真实评价</span></div><div><b>${safe(item.comment_count)}</b><span>评论数</span></div><div><b>${safe(item.like_count)}</b><span>点赞数</span></div></div><div class="checks"><b>真实性线索：</b>${item.comment_user_check}<br><b>作者检查：</b>${item.author_check}</div><div class="actions"><a class="btn primary" href="${item.note_url}" target="_blank" rel="noopener">打开小红书</a><a class="btn secondary" href="#gaps">看缺口</a></div></div></article>`}
function commentItems(item){if(Array.isArray(item.comments)&&item.comments.length)return item.comments;return item.comment_user_check?[{user:"评论线索",text:item.comment_user_check,reply:"完整评论和回复待后续详情页补采。",status:"clue_only"}]:[]}
function commentsHtml(item){const comments=commentItems(item);if(!comments.length)return `<section class="comments"><h3>评论与回复</h3><div class="comment"><p class="comment-text">待补采评论内容。</p></div></section>`;return `<section class="comments"><h3>评论与回复</h3>${comments.map(c=>`<div class="comment"><div class="comment-user">${c.user||"评论用户"}</div><p class="comment-text">${c.text||""}</p>${c.reply?`<div class="reply"><div class="comment-user">作者回复</div><p class="reply-text">${c.reply}</p></div>`:""}${c.status==="clue_only"?`<div class="comment-status">评论线索，非完整评论原文</div>`:""}</div>`).join("")}</section>`}
function renderDetail(){const item=findItem(state.detail.slug,state.detail.id);if(!item)return;const imgs=mediaList(item);state.detail.imgIndex=Math.min(state.detail.imgIndex,Math.max(imgs.length-1,0));const img=imgs[state.detail.imgIndex];const tags=[...(item.rental_constraints||[]),...(item.content_tags||[])].filter((t,i,a)=>a.indexOf(t)===i).map(t=>`<span class="tag">${t}</span>`).join("");el("detailTitle").textContent=item.item_name;el("detailContent").innerHTML=`<div class="detail-visual">${img?`<img alt="${item.item_name}" src="${img}">`:`<div class="visual-inner"><div class="visual-title">缺图</div><div class="visual-note">待补采图片</div></div>`}<span class="carousel-counter">${imgs.length?state.detail.imgIndex+1:0}/${imgs.length||0}</span><button class="carousel-nav prev" type="button" data-detail-slide="-1" ${imgs.length<=1?"disabled":""} aria-label="上一张">‹</button><button class="carousel-nav next" type="button" data-detail-slide="1" ${imgs.length<=1?"disabled":""} aria-label="下一张">›</button></div><div class="detail-body"><p class="note-title">${item.note_title}</p><h2>${item.item_name}</h2><p class="reason">${item.reason}</p><div class="tags">${tags}</div><div class="evidence"><div><b>${safe(item.real_comment_count)}</b><span>真实评价</span></div><div><b>${safe(item.comment_count)}</b><span>评论数</span></div><div><b>${safe(item.like_count)}</b><span>点赞数</span></div></div><div class="checks"><b>作者检查：</b>${item.author_check}<br><b>评论检查：</b>${item.comment_user_check}</div>${commentsHtml(item)}<div class="actions"><a class="btn primary" href="${item.note_url}" target="_blank" rel="noopener">打开小红书</a></div></div>`}
function openDetail(slug,id,imgIndex=0){state.detail={slug,id,imgIndex:Number(imgIndex)||0};renderDetail();el("detailModal").classList.add("open");el("detailModal").setAttribute("aria-hidden","false");document.body.style.overflow="hidden"}
function closeDetail(){el("detailModal").classList.remove("open");el("detailModal").setAttribute("aria-hidden","true");document.body.style.overflow=""}
function moveDetailImage(delta){const item=findItem(state.detail.slug,state.detail.id);const total=mediaList(item||{}).length;if(total<=1)return;state.detail.imgIndex=(state.detail.imgIndex+delta+total)%total;renderDetail()}
function moveCardImage(slug,id,delta){const item=findItem(slug,id);const total=mediaList(item||{}).length;if(total<=1)return;const key=cardKey(slug,id);cardImageState[key]=((cardImageState[key]||0)+delta+total)%total;renderContent()}
function bindDetailEvents(){el("detailClose").addEventListener("click",closeDetail);el("detailModal").addEventListener("click",e=>{if(e.target.id==="detailModal")closeDetail();const btn=e.target.closest("[data-detail-slide]");if(btn)moveDetailImage(Number(btn.dataset.detailSlide))});document.addEventListener("keydown",e=>{if(e.key==="Escape"&&el("detailModal").classList.contains("open"))closeDetail()})}
function bindCardEvents(){el("content").querySelectorAll("[data-open-detail]").forEach(card=>{card.addEventListener("click",e=>{const slide=e.target.closest("[data-card-slide]");if(slide)return;openDetail(card.dataset.slug,card.dataset.id,card.dataset.imgIndex)});card.addEventListener("keydown",e=>{if(e.key==="Enter")openDetail(card.dataset.slug,card.dataset.id,card.dataset.imgIndex)})});el("content").querySelectorAll("[data-card-slide]").forEach(btn=>btn.addEventListener("click",e=>{e.stopPropagation();moveCardImage(btn.dataset.slug,btn.dataset.id,Number(btn.dataset.cardSlide))}))}
function gapPanel(dataset){const items=dataset.items||[];const missingImage=items.filter(i=>!i.cover_image&&!(i.images||[]).length).length;const missingLike=items.filter(i=>i.like_count==null).length;const missingFavorite=items.filter(i=>i.favorite_count==null).length;return `<section class="gap-panel" id="gaps"><h3>页面暴露的采集缺口</h3><div class="gap-list"><div class="gap"><b>封面/图片</b><span>${missingImage} 条缺失，卡片只能占位</span></div><div class="gap"><b>点赞数</b><span>${missingLike} 条缺失，排序依据不足</span></div><div class="gap"><b>收藏数</b><span>${missingFavorite} 条缺失，无法评估长期价值</span></div><div class="gap"><b>细分位置</b><span>多数记录仍是全屋，需要补卧室、厕所、门口等</span></div></div></section>`}
function renderContent(){const key=state.manifest.keywords.find(k=>k.slug===state.selectedSlug);const dataset=state.datasets[state.selectedSlug]||{...key,items:[],summary:{target_count:5,valid_count:0}};const statusClass=key.status==="ready"?"ready":"planned";let html=`<div class="section-head"><div><h2>${key.keyword}</h2><p>${key.room_position} · ${key.category} · 目标 ${dataset.summary?.target_count||5} 条</p></div><span class="status ${statusClass}">${key.status}</span></div>`;if((dataset.items||[]).length){html+=`<div class="feed">${dataset.items.map((item,index)=>itemCard(item,index,dataset.slug)).join("")}</div>${gapPanel(dataset)}`}else{html+=`<div class="empty"><h3>待采集</h3><p>这个关键词还没有有效记录。页面已经预留卡片结构，后续采集时优先补封面图、点赞/收藏、内容标签、真实评价截图线索和细分房间位置。</p></div>${gapPanel(dataset)}`}html+=`<p class="footer-note">数据来自本地 <b>data/xiaohongshu</b>。当前页面用于验证展示结构，后续补图后可替换占位视觉。</p>`;el("content").innerHTML=html;bindCardEvents()}
function render(){renderSummary();renderTabs();renderContent()}
bindDetailEvents();
loadData().then(data=>{state={...state,...data};state.selectedSlug=state.manifest.keywords.find(k=>k.status==="ready")?.slug||state.manifest.keywords[0]?.slug;render()});
</script>
</body>
</html>
